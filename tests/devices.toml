[termometer]
resolution = 0.01  # Example value for the resolution of the temperature measurement
accuracy = 0.05    # Example value for the accuracy of the temperature measurement
distribution = "rectangular"  # Example value for the distribution of the temperature measurement uncertainty
k = 2.0  # Example value for the coverage factor for the temperature measurement uncertainty

[barometer]
resolution = 0.01  # 0.1 hPa
accuracy = 0.1    # 1.0 hPa from the accuracy of the pressure measurement. The resolution is added to the accuracy to be more conservative in the uncertainty estimation.
distribution = "rectangular"  # Example value for the distribution of the pressure measurement uncertainty
k = 2.0  # Example value for the coverage factor for the pressure measurement uncertainty